schema_version: "aikyat.secrets_contract.v1"
app_slug: "foundry-flutter"
secret_provider: "infisical"
secret_path: "/apps/foundry-flutter/release"

# ── iOS Signing ────────────────────────────────────────────────────────────────
# How to populate:
#   base64 -i certificate.p12 | pbcopy   → paste as IOS_DIST_CERT_P12_B64
#   base64 -i profile.mobileprovision | pbcopy → paste as IOS_PROVISIONING_PROFILE_B64
secrets:
  - key: IOS_DIST_CERT_P12_B64
    description: "iOS Distribution certificate (.p12) base64-encoded"
    required: true
    rotation_days: 365
    hint: "Export from Keychain Access → My Certificates → Apple Distribution → Export"

  - key: IOS_DIST_CERT_P12_PASSWORD
    description: "Password set when exporting the .p12 from Keychain"
    required: true

  - key: IOS_PROVISIONING_PROFILE_B64
    description: "App Store distribution provisioning profile (.mobileprovision) base64-encoded"
    required: true
    rotation_days: 365
    hint: "Download from developer.apple.com → Profiles → App Store profile for in.colligence.foundry.position"

# ── App Store Connect ──────────────────────────────────────────────────────────
# How to get API key:
#   App Store Connect → Users & Access → Integrations → App Store Connect API → Generate
  - key: APPSTORE_CONNECT_API_KEY_B64
    description: "App Store Connect API key (.p8 file) base64-encoded"
    required: true
    hint: "App Store Connect → Users & Access → Integrations → App Store Connect API → download .p8"

  - key: APPSTORE_CONNECT_API_KEY_ID
    description: "The Key ID shown next to your API key in App Store Connect"
    required: true
    example: "ABCDEF1234"

  - key: APPSTORE_CONNECT_ISSUER_ID
    description: "The Issuer ID shown at the top of the App Store Connect API page"
    required: true
    example: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# ── Android Signing ────────────────────────────────────────────────────────────
# How to generate keystore (if you don't have one):
#   keytool -genkey -v -keystore foundry-release.jks -keyalg RSA -keysize 2048 -validity 10000 -alias foundry
#   base64 -i foundry-release.jks | pbcopy → paste as ANDROID_KEYSTORE_B64
  - key: ANDROID_KEYSTORE_B64
    description: "Android release keystore (.jks) base64-encoded"
    required: true

  - key: ANDROID_KEYSTORE_PASSWORD
    description: "Password for the Android keystore"
    required: true

  - key: ANDROID_KEY_ALIAS
    description: "Key alias inside the keystore"
    required: true
    example: "foundry"

  - key: ANDROID_KEY_PASSWORD
    description: "Password for the key alias (often same as keystore password)"
    required: true

# ── Firebase ───────────────────────────────────────────────────────────────────
  - key: FIREBASE_GOOGLE_SERVICES_INFO_B64
    description: "GoogleService-Info.plist (iOS Firebase config) base64-encoded"
    required: true
    hint: "Download from Firebase Console → Project Settings → iOS app → GoogleService-Info.plist"

  - key: FIREBASE_GOOGLE_SERVICES_JSON_B64
    description: "google-services.json (Android Firebase config) base64-encoded"
    required: true
    hint: "Download from Firebase Console → Project Settings → Android app → google-services.json"
