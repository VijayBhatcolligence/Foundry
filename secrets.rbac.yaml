schema_version: "aikyat.secrets_rbac.v1"
app_slug: "foundry-flutter"
secret_provider: "infisical"

# Who can read which secret paths in Infisical.
# This is documentation — enforce these policies in your Infisical project's
# access control settings.

policies:
  - role: ci
    description: "Gitea Actions runner — reads all release secrets during builds"
    principals:
      - "gitea-actions-service-token"
    paths:
      - "/apps/foundry-flutter/release"
    permissions:
      - read

  - role: release-operator
    description: "Human operator running release tooling locally"
    principals:
      - "colligence-admin"
    paths:
      - "/apps/foundry-flutter/release"
    permissions:
      - read
      - write

  - role: developer
    description: "App developer — read-only access for local dev"
    principals:
      - "developer"
    paths:
      - "/apps/foundry-flutter/release"
    permissions:
      - read
